# for the internal mcp_registry._probe / bridge._resolve_base_url calls
# that the operator-side MCP probe endpoint needs.
"src/aila/modules/malware/api_router.py" = ["PLC0415", "N814", "SLF001"]
"src/aila/modules/malware/module.py" = ["PLC0415"]
"src/aila/modules/malware/runtime.py" = ["PLC0415"]
# malware/services/arq_purge.py: S301 because ARQ stores job payloads
