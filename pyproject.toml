# queue, NOT from untrusted input. Replacing pickle would mean
# re-encoding every queued job during a long deploy.
"src/aila/modules/malware/services/arq_purge.py" = ["PLC0415", "S301"]
# malware/services/branch_reaper.py: N806 for SQLAlchemy ORM uppercase
# aliases (BR, INV) following the standard convention used across
# every sweep helper.
"src/aila/modules/malware/services/branch_reaper.py" = ["N806"]
# malware/services/config_helpers.py: PLW0603 for the lazy registry
