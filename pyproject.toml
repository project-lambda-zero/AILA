# malware/agents/auto_steering.py: PLW0603 for single module-level
# _consecutive_failures counter; BLE001 because auto-steering must
# never fail loud (a steering-time exception would silently break
# every branch's next turn) -- the broad catch is intentional.
"src/aila/modules/malware/agents/auto_steering.py" = ["PLW0603", "BLE001"]
