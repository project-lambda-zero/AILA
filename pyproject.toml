[tool.ruff.lint.isort]
known-first-party = ["aila"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true

# Third-party libraries without complete stubs -- suppress at module boundary
[[tool.mypy.overrides]]
module = [

  "sentence_transformers.*",
  "asyncpg.*",
  "pgvector.*",
  "sqlmodel.*",
  "weasyprint.*",
  "croniter.*",
]
ignore_errors = true

# Storage layer: SQLAlchemy/SQLModel dynamic ORM patterns need targeted fixes
[[tool.mypy.overrides]]
module = ["aila.storage.*"]
ignore_errors = true

# Modules with complex dynamic dispatch -- fix in follow-up
[[tool.mypy.overrides]]
module = [
  "aila.modules.vulnerability.workflow.states.*",
  "aila.modules.vulnerability.adapters.*",
]
ignore_errors = true
