# malware/services/investigation_reaper.py: same N806 rationale as
# branch_reaper above; multiple ORM aliases inside the sweep helpers.
"src/aila/modules/malware/services/investigation_reaper.py" = ["N806"]
# malware/services/mcp_call_logger.py: BLE001 because the call logger
