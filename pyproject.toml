[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aila"
version = "7.0.0"
description = "Modular AI security platform with pluggable analysis modules."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "croniter==6.2.2",
  "cryptography==48.0.1",  # CVE-fix bump (GHSA: vulnerable OpenSSL in cryptography wheels < 48.0.1)
  "filelock==3.25.2",
  "fastapi==0.135.3",
  "httpx==0.28.1",
  "paramiko==5.0.0",  # CVE-2026-44405 (SHA-1 in rsakey.py): vuln_range <= 4.0.0; 5.0.0 is implicitly unaffected
  "pwdlib[bcrypt]==0.3.0",
  "argon2-cffi==25.1.0",
  "slowapi==0.1.9",
  "python-dotenv==1.2.2",
  "pydantic==2.11.7",
  "PyJWT==2.13.0",  # CVE-fix bump (PYSEC-2026-175/177/178/179, all fixed in 2.13.0)
  "sentence-transformers==5.3.0",

  "asyncpg==0.31.0",
  "psycopg[binary]==3.3.3",
  "alembic==1.18.4",
  "pgvector==0.4.2",
  "sqlmodel==0.0.37",
  "typer==0.24.1",
  "uvicorn==0.43.0",
  "arq==0.27.0",
  "redis==5.3.1",
  "openai==2.30.0",
  "prometheus-client==0.22.1",
  "tiktoken==0.12.0",
  "openpyxl==3.1.5",
  "structlog==25.5.0",
  "sqlalchemy==2.0.45",
  "jinja2==3.1.6",
  "reportlab==4.5.1",
  'python-magic==0.4.27; platform_system != "Windows"',
  'python-magic-bin==0.4.14; platform_system == "Windows"',
  # ──────────────────────────────────────────────────────────────
  # Transitive-dep CVE pins (Dependabot 30-high triage, 2026-06-11).
  # These packages are pulled in by fastapi / reportlab / httpx /
  # alembic / requests-via-pip-audit; pinning floor versions here
  # forces every operator deploy to pick up the patched releases
  # rather than whatever the upstream resolver happens to land on.
  # Each pin pairs with a CVE / PYSEC reference; bump the floor
  # when a higher version becomes available.
  # ──────────────────────────────────────────────────────────────
  "starlette>=1.0.1",   # PYSEC-2026-161 (fastapi backbone)
  "urllib3>=2.7.0",     # PYSEC-2026-141/142 (HTTP transport)
  "requests>=2.33.0",   # CVE-2026-25645 (HTTP client)
  "idna>=3.15",         # CVE-2026-45409 (domain parsing)
  "pillow>=12.2.0",     # 5 CVEs incl PYSEC-2026-165, CVE-2026-25990/40192/42309/42310/42311 (reportlab image)
  "lxml>=6.1.0",        # PYSEC-2026-87 (XML parsing)
  "mako>=1.3.12",       # CVE-2026-44307 (alembic templating)
  "gitpython>=3.1.50",  # GHSA-mv93-w799-cj2w (used transitively)
  "pygments>=2.20.0",   # CVE-2026-4539 (used by structlog / docs)
  "tornado>=6.5.5",     # PYSEC-2026-140 + 3 CVEs (used by jupyter-tooling deps)
]

[project.optional-dependencies]
dev = [
  "httpx>=0.27.0",
  "mypy>=1.10.0",
  "pytest>=9.0.3",  # CVE-2025-71176 fixed in 9.0.3
  "pytest-cov>=5.0.0",
  "pytest-randomly>=3.15.0",
  "ruff>=0.5.0",
  "types-paramiko>=3.4.0",
  "vulture>=2.11",
  "pip-audit>=2.7.0",
  "bandit>=1.8.0",
  "pre-commit>=4.0.0",
]
pdf-weasyprint = [
  # Optional: enables the WeasyPrint HTML→PDF renderer when GTK
  # runtime is available on the host. The default PDF renderer
  # (ReportLab, in core deps) does NOT require this.
  "weasyprint>=62.0",
]
server = [
  "gunicorn>=25.3.0",
]

[project.scripts]
aila = "aila.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.vulture]
min_confidence = 80
paths = ["src/"]

[tool.pytest.ini_options]
markers = [
    "e2e: end-to-end tests requiring live infrastructure (deselect with '-m not e2e')",
    "integration: integration tests requiring real API keys (deselect with '-m not integration')",
]
addopts = "--cov=src/aila --cov-report=term-missing -m 'not e2e and not integration'"
pythonpath = ["src"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.coverage.run]
source = ["src/aila"]
omit = [
    "src/aila/modules/_template/*",
    "src/aila/__main__.py",
    "*/__pycache__/*",
]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
fail_under = 25
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@(abc\\.)?abstractmethod",
    "\\.\\.\\.",
]

[tool.honesty_audit]
# Run: python -m aila.tools.honesty_audit src/ --whitelist honesty_whitelist.py
# Exit non-zero on findings. Add to CI alongside vulture.
paths = ["src/"]
whitelist = "honesty_whitelist.py"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
  "E",      # pycodestyle errors
  "F",      # pyflakes
  "W",      # pycodestyle warnings
  "I",      # isort
  "UP",     # pyupgrade
  "BLE",    # flake8-blind-except (BLE001)
  "E7",     # pycodestyle comparison rules (E712: comparison to True/False)
  "N",      # pep8-naming (N802: function name not lowercase)
  "PLC",    # pylint convention (PLC0415: import not at top-level)
]
ignore = [
  "E501",  # line too long -- handled by formatter, not lint
]

# ---------------------------------------------------------------------------
# Per-file ignores: legitimate suppressions that cannot be inlined as # noqa
#
# All entries here correspond to entries in src/aila/tools/honesty_whitelist.py
# which documents the justification for each suppression.
